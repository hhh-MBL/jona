kind = "mobile"
previewPath = "/"
title = "Jona Crochet's"
version = "1.0.0"
id = "artifacts/jona-crochets"
router = "expo-domain"

[[integratedSkills]]
name = "expo"
version = "1.0.0"

[[services]]
ensurePreviewReachable = "/status"
name = "expo"
paths = [ "/" ]
localPort = 20449

[services.development]
run = "pnpm --filter @workspace/jona-crochets run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/jona-crochets", "run", "build" ]
run = [ "pnpm", "--filter", "@workspace/jona-crochets", "run", "serve" ]

[services.env]
PORT = "20449"
BASE_PATH = "/"
